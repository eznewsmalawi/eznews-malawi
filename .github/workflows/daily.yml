name: Daily news refresh

on:
  schedule:
    # Runs three times a day at 07:00, 13:00, 19:00 Central Africa Time (UTC+2).
    # That's 05:00, 11:00, 17:00 UTC.
    # Note: GitHub Actions cron has up to ~15 minutes of jitter, so the actual
    # run may start a few minutes after the scheduled time.
    - cron: '0 5,11,17 * * *'
  workflow_dispatch:  # also allow manual triggering from the Actions tab

permissions:
  contents: write  # needed to commit the updated articles.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          LOG_LEVEL: INFO
        run: python pipeline/run.py

      - name: Commit and push if changed
        run: |
          git config user.name "ezNews bot"
          git config user.email "bot@eznews-malawi.local"
          git add site/data/articles.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: news refresh ($(date -u +%Y-%m-%d\ %H:%M\ UTC))"
            git push
          fi
